name: Publish to npm (Trusted Publishing)

# Publishes on a GitHub Release. Uses npm Trusted Publishing (OIDC) — no npm
# token/secret needed. Configure the trusted publisher on npmjs.com first:
#   Package → Settings → Trusted Publisher → GitHub Actions
#     Repository: janlemon/czech-bank-statements
#     Workflow filename: publish.yml
#     Allowed actions: npm publish
# Then bump the version, create a GitHub Release, and this runs automatically.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest # Trusted Publishing needs npm >= 11.5.1
      - run: npm install
      - run: npm test
      - run: npm publish # OIDC provides auth — no NODE_AUTH_TOKEN
